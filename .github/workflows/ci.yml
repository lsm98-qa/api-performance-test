name: QA API Test Pipeline

on:
  push:
    branches:
      - main
      - ci/github-actions
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_load_test_reports:
        description: "Run load test report generation"
        required: false
        default: false
        type: boolean

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  validate_python:
    name: Validate Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python syntax
        run: |
          python -m compileall -q conftest.py utils tests load_test/scripts

  qa_api_tests:
    name: Run QA API Tests
    runs-on: ubuntu-latest
    needs: validate_python
    env:
      LEARNER_TOKEN: ${{ secrets.LEARNER_TOKEN }}
      EDUCATOR_TOKEN: ${{ secrets.EDUCATOR_TOKEN }}
      EXPIRED_TOKEN: ${{ secrets.EXPIRED_TOKEN }}
      BASE_URL_CLASSROOM: ${{ secrets.BASE_URL_CLASSROOM }}
      BASE_URL_REST: ${{ secrets.BASE_URL_REST }}
      CLASSROOM_ID: ${{ secrets.CLASSROOM_ID }}
      CLASSROOM_ID_V2: ${{ secrets.CLASSROOM_ID_V2 }}
      COURSE_ID: ${{ secrets.COURSE_ID }}
      COURSE_ID_V2: ${{ secrets.COURSE_ID_V2 }}
      ORIGINAL_COURSE_ID: ${{ secrets.ORIGINAL_COURSE_ID }}
      LECTURE_ID: ${{ secrets.LECTURE_ID }}
      STUDENT_ID: ${{ secrets.STUDENT_ID }}
      FILTER_LECTURE_ID: ${{ secrets.FILTER_LECTURE_ID }}
      BOARD_ARTICLE_ID: ${{ secrets.BOARD_ARTICLE_ID }}
      BOARD_ARTICLE_ID_NO_TOKEN: ${{ secrets.BOARD_ARTICLE_ID_NO_TOKEN }}
      BOARD_ARTICLE_ID_BOUNDARY: ${{ secrets.BOARD_ARTICLE_ID_BOUNDARY }}
      EDUCATOR_CLASSROOM_ID: ${{ secrets.EDUCATOR_CLASSROOM_ID }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check required secrets
        shell: bash
        run: |
          missing=""
          for name in \
            LEARNER_TOKEN \
            EDUCATOR_TOKEN \
            EXPIRED_TOKEN \
            BASE_URL_CLASSROOM \
            BASE_URL_REST \
            CLASSROOM_ID \
            CLASSROOM_ID_V2 \
            COURSE_ID \
            COURSE_ID_V2 \
            ORIGINAL_COURSE_ID \
            LECTURE_ID \
            STUDENT_ID \
            FILTER_LECTURE_ID \
            BOARD_ARTICLE_ID \
            BOARD_ARTICLE_ID_NO_TOKEN \
            BOARD_ARTICLE_ID_BOUNDARY \
            EDUCATOR_CLASSROOM_ID; do
            eval "value=\${$name:-}"
            if [ -z "$value" ]; then
              missing="$missing $name"
            fi
          done

          if [ -n "$missing" ]; then
            echo "Missing required GitHub Secrets:$missing"
            exit 1
          fi

      - name: Run pytest
        continue-on-error: true
        run: |
          mkdir -p reports
          python -m pytest tests -v --junitxml=reports/pytest-junit.xml

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: reports/

  load_test_reports:
    name: Generate Load Test Reports
    runs-on: ubuntu-latest
    needs: qa_api_tests
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.run_load_test_reports == true }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate load test reports
        run: |
          python load_test/scripts/day6_data_check.py
          python load_test/scripts/preprocess_summary_csv.py
          python load_test/scripts/day7_avg_latency_graph.py
          python load_test/scripts/day7_max_min_graphs.py
          python load_test/scripts/day7_extra_graphs.py
          python load_test/scripts/day7_bottleneck_graphs.py
          python load_test/scripts/tsp_error_rate.py

      - name: Upload load test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: |
            load_test/processed/
            output/